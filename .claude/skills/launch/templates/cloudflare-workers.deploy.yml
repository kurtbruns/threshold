# Cloudflare Workers deploy for a Threshold site (Workers Static Assets).
# Copy this to .github/workflows/deploy.yml, add the CLOUDFLARE_API_TOKEN and
# CLOUDFLARE_ACCOUNT_ID repo secrets, commit, and push. Deploy settings (name,
# custom domain, assets) live in wrangler.jsonc at the repo root.
name: Deploy site to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve Hugo version (the kit's pin)
        id: hugo
        run: echo "version=$(bash scripts/hugo-version.sh)" >> "$GITHUB_OUTPUT"
      - name: Install Hugo (extended)
        env:
          HUGO_VERSION: ${{ steps.hugo.outputs.version }}
        run: |
          wget -O hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i hugo.deb
      - name: Build
        run: hugo --gc --minify
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
