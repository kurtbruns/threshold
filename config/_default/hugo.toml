# Threshold — site configuration
# Day-to-day site settings live here. The look (colors, fonts, spacing) lives
# in the styles under assets/ — see the docs for theming.

baseURL = "https://example.com/"
locale = "en-us"
title = "Threshold"
enableRobotsTXT = true
enableEmoji = true   # render :shortcode: emoji (e.g. :tada: → 🎉) alongside pasted emoji

[params]
  # Used for the site <meta description> when a page doesn't set its own.
  description = "A new website built with Threshold."

# Hugo version pin — the single source of truth for which Hugo to use.
# Read by scripts/hugo-version.sh (and CI). Requires the *extended* build: the
# responsive-image pipeline encodes WebP (layouts/partials/image.html), and only
# the extended edition can encode WebP. The usual installs are already extended
# (Homebrew's `hugo`, the headline release binary, Snap, Chocolatey).
[module]
  [module.hugoVersion]
    min = "0.161.1"
    extended = true

# Image processing defaults (used when Hugo resizes photos).
[imaging]
  quality = 82
  resampleFilter = "Lanczos"

# The top navigation menu is built from each page's front-matter: set
# `menus: main` (with a `weight` for order) on a page to list it in the header.
# Example: see content/_index.md, content/pages/_index.md, content/about/index.md.
