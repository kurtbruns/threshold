{{- /* {{< image src="photo.jpg" alt="..." caption="..." width="480" >}}

       A responsive image in a <figure> with an optional caption, centered by
       default. Runs through the image.html partial for responsive WebP/JPEG
       output (see that partial's comment for what it generates).

       src is a relative path, resolved against this page's bundle first, then
       assets/ — first match wins. So the same src works whether the image sits
       beside the page or is shared site-wide. Keeping images in an images/
       subfolder is convention, not a requirement: src="images/photo.jpg" finds
       content/<page>/images/photo.jpg or assets/images/photo.jpg, but any path
       that resolves in either place works. Build fails if neither has it.

       width caps the displayed size: a bare number is pixels (480 → 480px), or
       any CSS length like "30rem".

       No caption? Use plain Markdown — ![alt](photo.jpg) — same src resolution. */ -}}
{{- $src := .Get "src" -}}
{{- $alt := .Get "alt" | default "" -}}
{{- $caption := .Get "caption" -}}
{{- $width := .Get "width" -}}
{{- $img := or (.Page.Resources.GetMatch $src) (resources.Get $src) -}}
{{- if $img -}}
  {{- /* Normalize the width to a CSS length: a bare number becomes pixels
         (width="480" → "480px"); any other length is used as-is. */ -}}
  {{- $maxw := "" -}}
  {{- with $width -}}
    {{- $w := printf "%v" . -}}
    {{- $maxw = $w -}}
    {{- if findRE `^[0-9]+$` $w -}}{{- $maxw = printf "%spx" $w -}}{{- end -}}
  {{- end -}}
  {{- /* Tell the browser the rendered size so it fetches a right-sized source. */ -}}
  {{- $sizes := "(min-width: 48rem) 768px, calc(100vw - 2.5rem)" -}}
  {{- if and (ne $maxw "") (not (strings.Contains $maxw "%")) -}}
    {{- $sizes = printf "(min-width: %s) %s, calc(100vw - 2.5rem)" $maxw $maxw -}}
  {{- end -}}
<figure{{ with $maxw }} style="max-width: {{ . }}"{{ end }}>
  {{ partial "image.html" (dict "image" $img "alt" $alt "sizes" $sizes) }}
  {{- with $caption }}<figcaption>{{ . | markdownify }}</figcaption>{{ end -}}
</figure>
{{- else -}}
  {{- errorf "image shortcode: could not find image %q (used in %s)" $src .Position -}}
{{- end -}}
