{{- /* Favicons from a single SVG + PNG source in assets/favicons/.
       Replace those two files to change the site icon — the sizes below are
       derived automatically. */ -}}
{{- with resources.Get "favicons/icon.svg" -}}
  <link rel="icon" href="{{ .RelPermalink }}" type="image/svg+xml">
{{- end -}}
{{- with resources.Get "favicons/icon.png" -}}
  <link rel="icon" href="{{ (.Resize "32x32 png").RelPermalink }}" sizes="32x32" type="image/png">
  <link rel="icon" href="{{ (.Resize "48x48 png").RelPermalink }}" sizes="48x48" type="image/png">
  <link rel="apple-touch-icon" href="{{ (.Resize "180x180 png").RelPermalink }}">
{{- end -}}
