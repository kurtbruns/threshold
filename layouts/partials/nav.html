{{- with site.Menus.main -}}
<nav class="site-nav" aria-label="Main">
  <ul role="list">
    {{- range . -}}
    {{- $active := or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) -}}
    <li><a href="{{ with .Page }}{{ .RelPermalink }}{{ else }}{{ .URL }}{{ end }}"{{ if $active }} aria-current="page"{{ end }}>{{ .Name }}</a></li>
    {{- end -}}
  </ul>
</nav>
{{- end -}}
