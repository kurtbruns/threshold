<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Adaptive favicon: re-colors itself for the OS light/dark theme. No JS.
       Light: dark door frame, transparent background.
       Dark:  dark door slab on a light backdrop (so it stays visible). -->
  <style>
    .bg    { fill: none; }
    .panel { fill: #f8f8f8; }
    .ink   { fill: #404040; }
