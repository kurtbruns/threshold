# Deploys the Threshold demo site to GitHub Pages.
#
# This is the MAINTAINER's demo pipeline, not a site owner's. The job is
# gated to the source repo (see `if:` below), so a "Use this template" clone
# inherits this file inert — it never runs, fails, or deploys on their fork.
# The /launch guide sets up the owner's own deployment; it can delete this file.
#
# baseURL is NOT read from hugo.yaml (that stays the owner-facing
# placeholder). It's supplied at build time by actions/configure-pages, which
# derives the correct URL for the Pages site (and adapts if a custom domain is
# added later). Requires repo Settings → Pages → Source = "GitHub Actions".
name: Deploy demo to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let one deploy finish before the next starts; don't cancel an in-flight one.
concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  # One job builds and deploys. GitHub's canonical Pages template uses two jobs so a
  # separate `deploy` can gate on the `github-pages` environment (approval rules,
  # scoped permissions). This demo needs none of that, so one job is simpler and
  # saves a runner spin-up. Split back out if you ever want a manual approval gate.
  deploy:
    # Gate: only the maintainer's repo runs the demo. Skipped on any clone.
    if: github.repository == 'kurtbruns/threshold'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      HUGO_ENVIRONMENT: production
      TZ: America/Los_Angeles
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history so .GitInfo / .Lastmod are accurate

      - name: Resolve pinned Hugo version
        id: hugo
        run: echo "version=$(bash scripts/hugo-version.sh)" >> "$GITHUB_OUTPUT"

      - name: Install Hugo (extended)
        env:
          HUGO_VERSION: ${{ steps.hugo.outputs.version }}
        run: |
          wget -O "${{ runner.temp }}/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${{ runner.temp }}/hugo.deb"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_PARAMS_ISDEMO: "true"  # renders the demo notice (layouts/shortcodes/demo-notice.html)
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
