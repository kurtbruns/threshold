# Threshold site configuration: day-to-day site settings.
# The look (colors, fonts, spacing) lives in the styles under assets/css/.

baseURL: "https://example.com/"
locale: "en-us"
title: "Threshold"
enableRobotsTXT: true
enableEmoji: true   # render :shortcode: emoji (e.g. :tada: → 🎉) alongside pasted emoji

params:
  # Fallback <meta description> for a page with no description of its own and no
  # body text to summarize. Set it to your site tagline.
  description: "A new website built with Threshold."
  # The site owner, shown as the byline on blog posts. A single post can
  # override it with its own `author` in front matter.
  author: "Your Name"

# Hugo version pin: the single source of truth, read by scripts/hugo-version.sh
# and CI. A floor (Hugo warns if older; CI installs this exact version).
# The extended edition is recommended — the image pipeline uses it to output
# smaller WebP images — but not required: without it, images fall back to their
# original format (see layouts/partials/image.html). CI installs extended anyway.
module:
  hugoVersion:
    min: "0.164.0"
    extended: false

# Image resampling filter for downscaling (photos and favicons). JPEG/WebP
# quality lives with the responsive pipeline, in layouts/partials/image.html.
imaging:
  resampleFilter: "Lanczos"

# Syntax highlighting for fenced code blocks. `noClasses: false` makes Hugo emit
# CSS classes instead of inline colors, so the colors come from a stylesheet —
# assets/css/vendor/syntax.css — which follows the site's light/dark theme.
# `wrapperClass: highlight` names the wrapper Hugo puts around each block.
markup:
  highlight:
    noClasses: false
    wrapperClass: highlight

# The top navigation menu is built from front matter: set `menus: main` (with a
# `weight` for order) on a page to list it in the header. Example: content/about/index.md.
